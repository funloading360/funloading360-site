<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Check — FunLoading360</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0e; color: #fff; font-family: sans-serif; padding: 20px; }
  h1 { color: #f5a623; margin-bottom: 30px; font-size: 1.5rem; }
  h2 { color: #f5a623; margin: 30px 0 15px; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #2a2a3a; padding-bottom: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: #13131a; border: 1px solid #2a2a3a; border-radius: 12px; overflow: hidden; }
  .img-wrap { position: relative; width: 100%; height: 180px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .info { padding: 10px; }
  .name { font-size: 0.7rem; color: #f5a623; word-break: break-all; margin-bottom: 4px; }
  .controls { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  button { padding: 4px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
  .rot-left  { background: #3b3b5e; color: #fff; }
  .rot-right { background: #3b3b5e; color: #fff; }
  .rot-180   { background: #3b3b5e; color: #fff; }
  .ok-btn    { background: #166534; color: #fff; }
  .bad-btn   { background: #7f1d1d; color: #fff; }
  .status    { font-size: 0.65rem; margin-top: 6px; min-height: 16px; }
  .status.ok  { color: #4ade80; }
  .status.bad { color: #f87171; }
  .rotation-note { font-size: 0.65rem; color: #888; margin-top: 4px; }
  #summary { position: fixed; bottom: 20px; right: 20px; background: #13131a; border: 1px solid #f5a623; border-radius: 12px; padding: 16px; font-size: 0.8rem; min-width: 200px; }
  #summary h3 { color: #f5a623; margin-bottom: 8px; }
  #bad-list { color: #f87171; font-size: 0.7rem; line-height: 1.8; }
  #copy-btn { margin-top: 10px; background: #f5a623; color: #000; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: bold; font-size: 0.75rem; width: 100%; }
</style>
</head>
<body>
<h1>🖼 Image Check — FunLoading360</h1>
<p style="color:#888;margin-bottom:20px;font-size:0.85rem">Verifică fiecare imagine. Rotește dacă e nevoie, marchează OK sau Greșit.</p>

<div id="content"></div>

<div id="summary">
  <h3>Sumar</h3>
  <div id="bad-list">Nicio problemă raportată.</div>
  <button id="copy-btn" onclick="copyBad()">Copiază lista problemelor</button>
</div>

<script>
const images = {
  "events": [
    "360-couple-dancing.jpeg",
    "360-two-women-blue.jpeg",
    "360-confetti-pose.jpeg",
    "360-green-energy.jpeg",
    "360-jazz-costume.jpeg",
    "360-glamour-group.jpeg",
    "glam-print-strip.png"
  ],
  "venues": [
    "glam-venue-grand.jpeg","glam-venue-2.jpeg","glam-venue-christmas.jpeg",
    "glam-backdrop-printer.jpeg",
    "glam-setup-props.jpeg","glam-setup-2.jpeg","glam-setup-3.jpeg",
    "glam-setup-4.jpeg","glam-setup-5.jpeg","glam-setup-6.jpeg","glam-setup-7.jpeg",
    "selfie-pod-venue.jpeg","selfie-pod-christmas.jpeg","selfie-pod-christmas-2.jpeg",
    "selfie-pod-christmas-3.jpeg","selfie-pod-setup-2.jpeg",
    "360-booth-outdoor.jpeg","360-full-setup.jpeg","360-platform-lit.jpeg",
    "360-setup-neon.jpeg","360-setup-venue.jpeg",
    "IMG_3067.jpeg","venue-setup-1.jpeg","venue-setup-2.jpeg"
  ],
  "equipment": [
    "booth-exterior-hero.jpeg",
    "booth-exterior-1.jpeg",
    "booth-exterior-2.jpeg"
  ]
};

const rotations = {};
const statuses = {};

function render() {
  const el = document.getElementById('content');
  let html = '';
  for (const [cat, files] of Object.entries(images)) {
    html += `<h2>${cat} (${files.length} imagini)</h2><div class="grid">`;
    for (const f of files) {
      const path = `/images/${cat}/${f}`;
      const rot = rotations[f] || 0;
      const st = statuses[f] || '';
      html += `
        <div class="card" id="card-${f.replace(/\./g,'_')}">
          <div class="img-wrap">
            <img src="${path}?t=${Date.now()}" style="transform:rotate(${rot}deg);transition:transform 0.3s" onerror="this.style.background='#7f1d1d';this.alt='LIPSĂ'">
          </div>
          <div class="info">
            <div class="name">${f}</div>
            <div class="rotation-note">Rotație curentă: <b>${rot}°</b></div>
            <div class="controls">
              <button class="rot-left"  onclick="rotate('${f}','${cat}',-90)">↺ 90°</button>
              <button class="rot-right" onclick="rotate('${f}','${cat}',90)">↻ 90°</button>
              <button class="rot-180"   onclick="rotate('${f}','${cat}',180)">180°</button>
              <button class="ok-btn"    onclick="mark('${f}','ok')">✓ OK</button>
              <button class="bad-btn"   onclick="mark('${f}','bad')">✗ Greșit</button>
            </div>
            <div class="status ${st}" id="st-${f.replace(/\./g,'_')}">${st === 'ok' ? '✓ Corect' : st === 'bad' ? '✗ Marcat ca greșit' : ''}</div>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function rotate(file, cat, deg) {
  rotations[file] = ((rotations[file] || 0) + deg + 360) % 360;
  const img = document.querySelector(`#card-${file.replace(/\./g,'_')} img`);
  if (img) img.style.transform = `rotate(${rotations[file]}deg)`;
  document.querySelector(`#card-${file.replace(/\./g,'_')} .rotation-note`).textContent = `Rotație curentă: ${rotations[file]}°`;
  if (!statuses[file]) statuses[file] = 'bad';
  updateSummary();
}

function mark(file, status) {
  statuses[file] = status;
  const el = document.getElementById(`st-${file.replace(/\./g,'_')}`);
  el.className = `status ${status}`;
  el.textContent = status === 'ok' ? '✓ Corect' : '✗ Marcat ca greșit';
  updateSummary();
}

function updateSummary() {
  const bad = Object.entries(statuses).filter(([,v]) => v === 'bad');
  const el = document.getElementById('bad-list');
  if (bad.length === 0) { el.textContent = 'Nicio problemă raportată.'; return; }
  el.innerHTML = bad.map(([f]) => {
    const r = rotations[f] || 0;
    return `<div>${f}<br><span style="color:#888">→ rotatie: ${r}°</span></div>`;
  }).join('');
}

function copyBad() {
  const bad = Object.entries(statuses).filter(([,v]) => v === 'bad');
  const text = bad.map(([f]) => `${f}: ${rotations[f] || 0}°`).join('\n');
  navigator.clipboard.writeText(text || 'Nicio problemă');
}

render();
</script>
</body>
</html>
